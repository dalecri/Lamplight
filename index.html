      transition: transform 0.15s ease;
    }
    @media (hover: hover) and (pointer: fine) {
      .spine-lift:hover { transform: rotate(var(--tilt, 0deg)) translateY(-10px); }
    }

    /* Mobile: the exact same spine, physically rotated 90deg so books lie flat and stack upward like a pile */
    .spine-mobile-wrap {
      position: relative;
      width: var(--sw);
      height: var(--sh);
    }
    @media (max-width: 639px) {
      .spine-mobile-wrap.stack-mode {
        width: var(--ml) !important;
        height: var(--swm) !important;
      }
      .spine-mobile-wrap.stack-mode .spine-lift {
        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        width: var(--swm) !important;
        height: var(--ml) !important;
        transform: translate(-50%, -50%) rotate(-90deg) !important;
        transform-origin: center !important;
      }
      @media (hover: hover) and (pointer: fine) {
        .spine-mobile-wrap.stack-mode .spine-lift:hover {
          transform: translate(-50%, -50%) rotate(-90deg) translateY(-10px) !important;

      }
      /* Icons (trash, decorative pixel icons) counter-rotate so they read upright despite the spine itself being rotated */

      to { opacity: 1; transform: translateX(0); }

    @media (prefers-reduced-motion: reduce) {
      .reading-page-anim { animation: none; }
    }

    @keyframes book-open {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
